<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Сканер сервера</title>
        <style>
			body {
				font-family: monospace;
				padding: 20px;
				background: #1e1e1e;
				color: #d4d4d4;
			}
			.metric {
				margin-bottom: 20px;
				padding: 10px;
				border-left: 3px solid #444;
				
			}
			.metric p {
				font-weight: bold;
				font-size: 1.2em;
				margin-bottom: 10px;
				color: #569cd6;
			}
			.metric span {
				font-size: 1.5em;
				font-weight: bold;
				margin-left: 20px;
			}
			.warning{
				background-color:gold;
				border-radius:10px;
				color:black;
				padding:10px;	
			}:empty{
				display:none;
			}
		</style>
    </head>
    <body>
		<div class="warning" id="warning"></div>
        <div class="metric"><p>TIME:</p><span id="time"></span></div>
        <div class="metric"><p>DATE:</p><span id="date"></span></div>
        <div class="metric"><p>CPU:</p><span id="cpu"></span></div>
        <div class="metric"><p>MEM:</p> <span id="mem"></span></div>
        <div class="metric"><p>DNL:</p><span id="dnl"></span></div>
        <div class="metric"><p>UPL:</p><span id="upl"></span></div>
    </body>
    <script>
        get = i=>document.getElementById(i);

		setInterval(async ()=>{
			try{
				response = await fetch('/api/data');
				if(!response.ok)
					throw new Error();
				data = await response.json();
				get('time').innerHTML = data.TIME.time;
				get('date').innerHTML = data.TIME.date;
				get('cpu').innerHTML = data.CPU.rep.percentage + "%";
				get('mem').innerHTML = data.MEM.rep.percentage + "%";
				get('dnl').innerHTML = data.NET.rep.download + " bit/s";
				get('upl').innerHTML = data.NET.rep.upload + " bit/s";
				get('warning').innerHTML = '';
			}catch(e){
				get('warning').innerHTML = 'ошибка';
			}
		},1000);
    </script>
